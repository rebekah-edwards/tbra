<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>tbr*a — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e4e2ef;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
    }
    .logo span { color: #a3e635; }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p {
      color: #8b8a97;
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
      max-width: 280px;
    }
    button {
      background: #a3e635;
      color: #18181b;
      border: none;
      border-radius: 0.5rem;
      padding: 0.625rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="logo">tbr<span>*</span>a</div>
  <h1>You're offline</h1>
  <p>Check your internet connection and try again to get back to your books.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
