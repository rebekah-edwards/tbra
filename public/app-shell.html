<title>tbr*a</title>
<style>
  body { margin: 0; font-family: system-ui, sans-serif; }
  .shell { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  [data-theme="dark"] .shell, .shell { background: #0a0a0f; }
  @media (prefers-color-scheme: light) { .shell { background: #fafbfc; } }
  .spinner { width: 24px; height: 24px; border: 2px solid #a3e635; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="shell">
  <!-- Spinner only. No logo — avoids the system-font vs Space Grotesk asterisk mismatch. -->
  <div class="spinner"></div>
