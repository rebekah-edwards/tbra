<!DOCTYPE html>

<head>

<title>tbr*a</title>
<style>

  .spinner { width: 20px; height: 20px; border: 2px solid #a3e635; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
